<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --accent: #4f6ef7;
    --accent2: #6c3fc5;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --success: #22c55e;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; gap: 0; }

  /* ── SIDEBAR ── */
  aside {
    width: 340px; min-width: 300px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100vh; overflow-y: auto;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1a1d27 0%, #1e2236 100%);
  }
  .sidebar-header h1 { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  .sidebar-header p  { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px; padding: 3px 8px; margin-bottom: 10px;
    font-size: 10px; font-weight: 600; letter-spacing: .5px;
  }

  .sections { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; cursor: pointer;
    user-select: none; font-size: 12px; font-weight: 600;
    border-bottom: 1px solid transparent;
    transition: background .15s;
  }
  .section-head:hover { background: rgba(255,255,255,.04); }
  .section-head.open { border-bottom-color: var(--border); }
  .section-head .icon { font-size: 14px; }
  .section-head .chevron { margin-left: auto; transition: transform .2s; color: var(--muted); font-size: 10px; }
  .section-head.open .chevron { transform: rotate(180deg); }
  .section-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 9px; }
  .section-body.hidden { display: none; }

  label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
  input[type=text] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-size: 12px; font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  .img-field { display: flex; align-items: center; gap: 8px; }
  .img-field input { flex: 1; }
  .img-thumb {
    width: 36px; height: 36px; border-radius: 6px;
    border: 1px solid var(--border); object-fit: contain;
    background: var(--bg); flex-shrink: 0;
  }

  /* ── MAIN ── */
  main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar h2 { font-size: 13px; font-weight: 600; flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s;
    font-family: inherit;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: .9; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-success { background: #14532d; color: var(--success); border: 1px solid #166534; }

  .content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* Preview box */
  .preview-box {
    background: #fff; border-radius: var(--radius);
    padding: 20px; display: inline-block;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .preview-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

  /* Code output */
  .code-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .code-header { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 8px; }
  .code-header span { font-size: 11px; color: var(--muted); font-weight: 600; flex: 1; }
  .code-dots { display: flex; gap: 5px; }
  .code-dots i { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  textarea#output {
    width: 100%; background: transparent; border: none; outline: none;
    color: #a5d6a7; font-size: 11px; font-family: 'Courier New', monospace;
    padding: 14px; resize: vertical; min-height: 160px; line-height: 1.6;
  }
</style>
</head>
<body>

function update() {
  const html = build();
  document.getElementById('preview').innerHTML = html;
  document.getElementById('output').value = html;
}

function copyCode() {
  const ta = document.getElementById('output');
  ta.select();
  document.execCommand('copy');
  const btn = event.currentTarget;
  const orig = btn.innerHTML;
  btn.innerHTML = '✅ Copied!';
  btn.classList.add('btn-success');
  setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('btn-success'); }, 2000);
}

update();
</script>
