<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Solutions · Signature Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080b14;
  --s1:       #0e1120;
  --s2:       #131729;
  --s3:       #1a1f35;
  --border:   #232840;
  --border2:  #2e3555;
  --accent:   #5b6ef5;
  --accent2:  #8b5cf6;
  --glow:     rgba(91,110,245,.25);
  --text:     #e8eaf6;
  --muted:    #636b96;
  --muted2:   #9099c4;
  --success:  #22c55e;
  --r:        14px;
  --r-sm:     8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
aside{width:360px;min-width:300px;display:flex;flex-direction:column;background:var(--s1);border-right:1px solid var(--border);height:100vh;}
main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}

/* ── SIDEBAR HEADER ── */
.sh{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(160deg,#0e1428 0%,#111830 100%);}
.sh-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sh-logo{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 16px var(--glow);}
.sh-brand h1{font-size:14px;font-weight:700;letter-spacing:.2px;}
.sh-brand p{font-size:10px;color:var(--muted);margin-top:1px;}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:var(--r-sm);padding:3px;}
.tab{flex:1;padding:6px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .2s;}
.tab.active{background:var(--s3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4);}

/* ── SIDEBAR BODY ── */
.sb{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.sb::-webkit-scrollbar{width:4px;}
.sb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.panel{display:none;}
.panel.active{display:flex;flex-direction:column;gap:8px;}

/* ── ACCORDION ── */
.acc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.acc:focus-within{border-color:var(--border2);}
.acc-head{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.acc-head:hover{background:rgba(255,255,255,.03);}
.acc-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.acc-icon.purple{background:rgba(139,92,246,.15);}
.acc-icon.blue  {background:rgba(91,110,245,.15);}
.acc-icon.teal  {background:rgba(20,184,166,.15);}
.acc-icon.amber {background:rgba(251,191,36,.15);}
.acc-title{font-size:12px;font-weight:600;flex:1;}
.acc-arrow{color:var(--muted);font-size:9px;transition:transform .25s;}
.acc.open .acc-arrow{transform:rotate(180deg);}
.acc-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;}
.acc.open .acc-body{max-height:600px;padding:0 14px 14px;}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.field:first-child{margin-top:0;}
.field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.field input{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:9px 11px;color:var(--text);font-size:12px;font-family:inherit;outline:none;
  transition:border-color .15s,box-shadow .15s;width:100%;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.field input::placeholder{color:var(--muted);}
.img-row{display:flex;gap:8px;align-items:center;}
.img-row input{flex:1;}
.thumb{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);
  object-fit:contain;background:var(--s1);flex-shrink:0;}

/* ── MAIN TOPBAR ── */
.topbar{display:flex;align-items:center;gap:8px;padding:14px 18px;
  border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0;}
.topbar-title{font-size:13px;font-weight:600;flex:1;}
.topbar-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-sm);
  font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px var(--glow);}
.btn-primary:hover{opacity:.88;box-shadow:0 4px 20px var(--glow);}
.btn-ghost{background:var(--s3);color:var(--muted2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.section-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}

/* ── PREVIEW ── */
.preview-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.preview-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s1);}
.preview-bar span{font-size:11px;color:var(--muted);flex:1;}
.dots{display:flex;gap:5px;}
.dot{width:10px;height:10px;border-radius:50%;}
.preview-body{padding:20px;background:#fff;overflow-x:auto;}

/* ── CODE BOX ── */
.code-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.code-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
.code-bar span{font-size:11px;color:var(--muted);flex:1;font-family:monospace;}
textarea#output{width:100%;background:transparent;border:none;outline:none;resize:none;
  color:#a5d6a7;font-size:11px;font-family:'Courier New',monospace;
  padding:14px;min-height:130px;line-height:1.65;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;
  box-shadow:0 8px 32px var(--glow);transform:translateY(80px);opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── MOBILE ── */
@media(max-width:768px){
  html,body{overflow:auto;}
  .app{flex-direction:column;height:auto;overflow:visible;}
  aside{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  main{height:auto;overflow:visible;}
  .content{overflow:visible;}
  .preview-body{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .topbar{flex-wrap:wrap;gap:6px;}
  .topbar-info{flex:1 1 100%;}
}
@media(max-width:480px){
  .sh{padding:14px;}
  .content{padding:14px;}
  .btn span{display:none;}
}
</style>
</head>

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* Accordion */
function toggleAcc(head) {
  head.parentElement.classList.toggle('open');
}

/* Thumb preview */
function thumb(inputId, imgId) {
  document.getElementById(imgId).src = document.getElementById(inputId).value.trim();

function copyCode() {

  document.execCommand('copy');
